name: Update SST quarterly

on:
  schedule:
    - cron: "0 6 1 1,4,7,10 *"   # 1 ene, 1 abr, 1 jul, 1 oct — 06:00 UTC
  workflow_dispatch:

jobs:
  update-sst:
    runs-on: ubuntu-latest
    env:
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python 01_download.py
          python 02_process.py
          python 03_visualize.py

      - name: Commit run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runs/ figures/runs/
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear."
          else
            RUN_ID=$(python -c "from config import RUN_ID; print(RUN_ID)")
            FECHA=$(date -u +%Y-%m-%d)
            git commit -m "chore: SST update run ${RUN_ID} – ${FECHA}"
            git push origin main
          fi
